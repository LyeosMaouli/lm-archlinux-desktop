---
# Ansible Inventory Configuration
# This file is automatically generated from deploy-config/deploy.conf
# DO NOT EDIT MANUALLY - Changes will be overwritten

all:
  hosts:
    hostname_placeholder:
      ansible_host: 127.0.0.1
      ansible_connection: local
      ansible_user: root
      ansible_become: yes

  children:
    laptops:
      hosts:
        hostname_placeholder:

    desktops:
      hosts: {}

  vars:
    # Global variables
    ansible_python_interpreter: /usr/bin/python3

    # Project configuration
    project_name: lm-archlinux-desktop
    deployment_user: "username_placeholder"

    # System configuration
    locale: "en_US.UTF-8"
    keymap: "fr"
    timezone: "Europe/Paris"
    hostname: "hostname_placeholder"

    # Package mirrors
    country_code: ""
    mirror_country: ""

    # Desktop environment
    desktop_environment: hyprland
    display_manager: sddm
    desktop_theme: "catppuccin-mocha"

    # Security settings
    enable_firewall: true
    enable_fail2ban: true
    enable_audit: true
    
    # SSH configuration
    ssh_port: 6741
    enable_ssh: false

    # Power management
    enable_tlp: true
    enable_thermald: true
    
    # Hardware acceleration
    enable_hardware_accel: true
    
    # Additional features
    enable_bluetooth: true
    enable_printing: true
    enable_swap: true
    
    # Package management
    enable_aur: true
    parallel_downloads: 5
    custom_packages: ""
