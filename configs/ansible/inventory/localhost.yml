---
all:
  hosts:
    localhost:
      ansible_host: 127.0.0.1
      ansible_connection: local
      ansible_user: root
      ansible_become: yes

  children:
    laptops:
      hosts:
        localhost:

    desktops:
      hosts: {}

  vars:
    # Global variables
    ansible_python_interpreter: /usr/bin/python3

    # Project configuration
    project_name: lm-archlinux-desktop
    deployment_user: "{{ user_username | default('user') }}"

    # System configuration
    locale: en_US.UTF-8
    keymap: us
    timezone: UTC
    hostname: localhost

    # Package mirrors (auto-detected)
    country_code: ""
    mirror_country: ""

    # Desktop environment
    desktop_environment: hyprland
    display_manager: sddm

    # Security settings
    enable_firewall: true
    enable_fail2ban: true
    enable_audit: true

    # Power management (laptop specific)
    enable_tlp: true
    enable_thermald: true
