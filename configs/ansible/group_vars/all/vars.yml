---
# Global variables for all hosts
# This file is automatically generated from config/deployment.conf
# DO NOT EDIT MANUALLY - Changes will be overwritten

# System configuration
system:
  locale: "en_US.UTF-8"
  keymap: "fr"
  timezone: "Europe/Paris"
  hostname: "phoenix"
  
# User configuration
users:
  main_user: "lyeosmaouli"
  groups:
    - wheel
    - audio
    - video
    - storage
    - network
    - input
    - optical
  shell: /bin/zsh

# Package management
packages:
  base_packages:
    - base-devel
    - linux-firmware
    - networkmanager
    - sudo
    - openssh
    - git
    - reflector
    - neovim
    - tmux
    - htop
    - zsh
    - curl
    - wget
    - tree
    - zip
    - unzip
    - trash-cli
    
  aur_packages:
    - visual-studio-code-bin
    - discord
    - zoom
    - hyprpaper
    - bibata-cursor-theme
    
# Desktop environment
desktop:
  environment: hyprland
  display_manager: sddm
  
  hyprland_packages:
    - hyprland
    - waybar
    - wofi
    - mako
    - kitty
    - thunar
    - grim
    - slurp
    - wl-clipboard
    - xdg-desktop-portal-hyprland
    - polkit-gnome
    - qt5-wayland
    - qt6-wayland
    
  graphics_packages:
    - mesa
    - intel-media-driver
    - vulkan-intel
    
  audio_packages:
    - pipewire
    - pipewire-pulse
    - pipewire-alsa
    - wireplumber
    
  applications:
    - firefox
    - thunderbird
    - libreoffice-still
    - vlc
    - okular
    - cups
    
# Security configuration
security:
  firewall:
    enabled: true
    default_policy: deny
    
  fail2ban:
    enabled: true
    
  audit:
    enabled: true
    
  ssh:
    port: 22
    permit_root_login: "no"
    password_authentication: "no"
    pubkey_authentication: "yes"
    
# Power management
power:
  tlp:
    enabled: true
    
  thermald:
    enabled: true
    
# Mirrors
mirrors:
  country: "France"
  
# Bootloader
bootloader:
  type: systemd-boot
  timeout: 5
  
# Logging
logging:
  directory: /var/log/ansible
  max_size: 100M
  backup_count: 5
