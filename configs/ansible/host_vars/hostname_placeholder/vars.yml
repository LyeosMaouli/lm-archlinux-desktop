---
# Host-specific variables for hostname_placeholder
# This file is automatically generated from deploy-config/deploy.conf
# DO NOT EDIT MANUALLY - Changes will be overwritten

# Hardware specific configuration
hardware:
  type: laptop
  cpu_vendor: intel
  gpu_vendor: intel
  form_factor: laptop
  
# Network configuration
network:
  hostname: hostname_placeholder
  interfaces:
    - name: wlan0
      type: wireless
    - name: eth0
      type: ethernet
      
# Storage configuration
storage:
  filesystem: ext4
  encryption: true
  swap:
    type: hybrid  # zram + hibernation swapfile
    zram_size: 4G
    swapfile_size: 8G
    
# Display configuration
display:
  primary:
    resolution: "1920x1080"
    refresh_rate: 60
    
# Power management
power_management:
  battery_optimization: true
  cpu_scaling_governor: powersave
  intel_pstate: true
  wifi_power_save: true
  
# Bluetooth
bluetooth:
  enabled: true
  auto_power_on: true
  
# Audio
audio:
  system: pipewire
  bluetooth_codec: aptx
  
# Development tools (profile dependent)
development:
  languages:
    - python
    - nodejs
    - rust
    - go
  editors:
    - visual-studio-code-bin
  tools:
    - docker
    - kubectl
    - terraform
    
# Security enhancements
security_enhanced:
  disk_encryption: true
  secure_boot: false  # May conflict with Hyprland
  tpm2: true
  firewall_strict: true

# Git configuration (from deploy.conf)
git:
  username: "Your Name"
  email: "your.email@example.com"
  
# SSH configuration
ssh:
  generate_keys: true
  key_type: "ed25519"
