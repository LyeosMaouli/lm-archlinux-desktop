---
# work Profile Configuration
# Generated from config/deploy.conf - DO NOT EDIT MANUALLY

profile_name: "work"
profile_type: "WORK"

# System Configuration
system:
  hostname: "work-system"
  timezone: "UTC"
  locale: "en_US.UTF-8"
  keymap: "us"

# User Configuration  
user:
  username: "workuser"
  shell: "/bin/bash"
  groups:
    - wheel
    - audio
    - video
    - network
    - storage

# Desktop Configuration
desktop:
  environment: "hyprland"
  display_manager: "sddm"
  theme: "catppuccin-mocha"
  auto_login: false

# Security Configuration
security:
  firewall:
    enabled: true
    default_policy: "deny"
  fail2ban:
    enabled: true
  audit:
    enabled: true
  ssh:
    port: 22
    password_auth: false
    root_login: false
    key_types: ["ed25519"]

# Development Configuration
development:
  git:
    username: "Work User"
    email: "user@company.com"
  ssh_keys:
    generate: true
    type: "ed25519"
  tools_enabled: true

# Hardware Configuration
hardware:
  bootloader: "systemd-boot"
  filesystem: "ext4"
  encryption: true
  bluetooth: true
  printing: true

# Package Configuration
packages:
  aur_enabled: true
  custom_packages: ""
  parallel_downloads: 5

# Automation Configuration
automation:
  skip_confirmations: false
  auto_reboot: false
  continue_on_error: false
  log_level: "3"
  debug: false
