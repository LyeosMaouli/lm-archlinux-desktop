---
# Work Profile Configuration
# This file is automatically generated from config/deployment.conf
# DO NOT EDIT MANUALLY - Changes will be overwritten

profile_name: "work"
profile_type: "WORK"

# System Configuration
system:
  hostname: "phoenix"
  timezone: "Europe/Paris"
  locale: "en_US.UTF-8"
  keymap: "fr"

# User Configuration
user:
  username: "lyeosmaouli"
  shell: "/bin/bash"
  groups:
    - wheel
    - audio
    - video
    - network
    - storage

# Desktop Configuration
desktop:
  environment: "hyprland"
  theme: "catppuccin-mocha"
  auto_login: false

# Security Configuration
security:
  firewall:
    enabled: true
    default_policy: "deny"
  fail2ban:
    enabled: true
  audit:
    enabled: true
  ssh:
    port: 22
    password_auth: false
    root_login: false
    key_types: ["ed25519"]

# Development Tools
development:
  git:
    username: ""
    email: ""
  ssh_keys:
    generate: true
    type: "ed25519"

# Automation Configuration
automation:
  skip_confirmations: false
  auto_reboot: false
  backup_configs: true
  log_level: "info"
