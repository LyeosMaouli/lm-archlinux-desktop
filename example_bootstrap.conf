# Arch Linux Hyprland Desktop Automation Configuration - EXAMPLE
# This is an example configuration file showing different deployment scenarios
# Copy this file to bootstrap.conf and edit according to your needs

# Repository Settings (usually don't need to change)
REPO_URL=https://github.com/LyeosMaouli/lm_archlinux_desktop.git
BRANCH=main

# ========================================
# EXAMPLE 1: WORK LAPTOP CONFIGURATION
# ========================================

# System Identity
HOSTNAME=work-laptop
USERNAME=jdoe

# Localization
TIMEZONE=America/New_York
LOCALE=en_US.UTF-8
KEYMAP=us

# Deployment Profile
PROFILE=work

# Security Settings
ENABLE_ENCRYPTION=true

# Automation Settings
AUTO_REBOOT=true

# Password Management (leave empty for secure interactive prompts)
USER_PASSWORD=
ROOT_PASSWORD=
ENCRYPTION_PASSPHRASE=

# Network Configuration (auto-detected in most cases)
WIFI_SSID=
WIFI_PASSWORD=

# Additional packages for work environment
EXTRA_PACKAGES=libreoffice-fresh,firefox,thunderbird
AUR_PACKAGES=slack-desktop,teams-for-linux

# ========================================
# EXAMPLE 2: PERSONAL GAMING SYSTEM
# ========================================

# Uncomment and modify these values for a personal gaming setup:
# HOSTNAME=gaming-rig
# USERNAME=gamer
# TIMEZONE=Europe/London
# LOCALE=en_GB.UTF-8
# KEYMAP=uk
# PROFILE=personal
# ENABLE_ENCRYPTION=false
# EXTRA_PACKAGES=steam,discord,vlc,gimp
# AUR_PACKAGES=spotify,discord-canary

# ========================================
# EXAMPLE 3: DEVELOPMENT WORKSTATION
# ========================================

# Uncomment and modify these values for a development setup:
# HOSTNAME=dev-machine
# USERNAME=developer
# TIMEZONE=Asia/Tokyo
# LOCALE=ja_JP.UTF-8
# KEYMAP=jp106
# PROFILE=development
# ENABLE_ENCRYPTION=true
# EXTRA_PACKAGES=docker,nodejs,npm,python-pip,git
# AUR_PACKAGES=visual-studio-code-bin,postman-bin,docker-desktop

# ========================================
# VIRTUALBOX TESTING CONFIGURATION
# ========================================
# Use these settings when testing with VirtualBox VMs

# VM Resources
VM_MEMORY=8192
VM_DISK_SIZE=60G
VM_OPTIMIZATION=true

# Testing-specific settings
# HOSTNAME=vm-test
# USERNAME=testuser
# PROFILE=personal
# ENABLE_ENCRYPTION=false
# AUTO_REBOOT=false
# DEBUG_MODE=true

# ========================================
# ADVANCED CONFIGURATION EXAMPLES
# ========================================

# Package mirror optimization
# MIRROR_COUNTRY=US  # Use US mirrors
# MIRROR_COUNTRY=DE  # Use German mirrors
# MIRROR_COUNTRY=FR  # Use French mirrors

# Custom kernel installation
# CUSTOM_KERNEL=linux-zen     # Gaming-optimized kernel
# CUSTOM_KERNEL=linux-lts     # Long-term support kernel
# CUSTOM_KERNEL=linux-hardened # Security-focused kernel

# Skip certain deployment phases for partial installs
# SKIP_PHASES=desktop         # Install base system only
# SKIP_PHASES=desktop,security # Skip desktop and security hardening
# SKIP_PHASES=packages        # Skip additional package installation

# Debug mode for troubleshooting
DEBUG_MODE=false

# ========================================
# LOCALE AND KEYBOARD EXAMPLES
# ========================================

# Common timezone examples:
# Europe/Paris, Europe/London, Europe/Berlin
# America/New_York, America/Los_Angeles, America/Chicago
# Asia/Tokyo, Asia/Shanghai, Australia/Sydney

# Common locale examples:
# en_US.UTF-8 (US English)
# en_GB.UTF-8 (UK English)
# fr_FR.UTF-8 (French)
# de_DE.UTF-8 (German)
# ja_JP.UTF-8 (Japanese)

# Common keymap examples:
# us (US QWERTY)
# uk (UK QWERTY)
# fr (French AZERTY)
# de (German QWERTZ)
# jp106 (Japanese)

# ========================================
# SECURITY RECOMMENDATIONS
# ========================================

# PRODUCTION DEPLOYMENT:
# - Always leave passwords empty for interactive prompts
# - Enable encryption for laptops and sensitive data
# - Use strong, unique passwords
# - Consider using encrypted password files for automation

# TESTING DEPLOYMENT:
# - Can use pre-set passwords for automated testing
# - Disable encryption for faster testing cycles
# - Enable debug mode for troubleshooting

# ========================================
# PROFILE DESCRIPTIONS
# ========================================

# work:
#   - Business applications (LibreOffice, email clients)
#   - Development tools (VS Code, Git)
#   - Communication apps (Teams, Slack)
#   - Security hardening enabled
#   - Power management optimized for laptops

# personal:
#   - Multimedia applications (VLC, GIMP, Audacity)
#   - Gaming support (Steam, Lutris)
#   - Social applications (Discord, Spotify)
#   - Balanced security and usability

# development:
#   - Full development toolchain
#   - Multiple programming language support
#   - Container and virtualization tools
#   - Advanced terminal and editor configurations
#   - Git and version control optimization