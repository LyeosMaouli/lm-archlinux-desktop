# Arch Linux Hyprland Desktop Automation - Bootstrap Configuration EXAMPLE
# 
# This file contains ONLY information needed BEFORE downloading the repository.
# Copy this file to bootstrap.conf and customize for your deployment.
# For detailed deployment settings, see config/deploy.conf in the downloaded repository.

#
# Repository Settings (Required) - Usually don't need to change
#

# Repository URL and branch to download
REPO_URL=https://github.com/LyeosMaouli/lm-archlinux-desktop.git
BRANCH=main

# ========================================
# EXAMPLE 1: WORK LAPTOP CONFIGURATION
# ========================================

# Basic System Identity (Required for initial setup)
HOSTNAME=work-laptop
USER_NAME=jdoe

# Network Configuration (Optional - for automatic network setup)
# WiFi credentials for automatic connection during bootstrap
# Leave empty to configure manually or use ethernet
WIFI_SSID=
WIFI_PASSWORD=

# Deployment Profile Selection (Required)
# Which deployment profile to use: work, personal, or development
# This determines which detailed configuration will be loaded from the repository
PROFILE=work

#
# Password Management (Required for deployment)
#

# User password handling mode - How to obtain passwords for user accounts
# Options: env, file, generate, interactive, auto
# Recommended: "generate" for automated deployments, "interactive" for manual setup
PASSWORD_MODE=generate

# Path to encrypted password file (required if PASSWORD_MODE=file)
# Use scripts/utils/passwords.sh create-file to generate encrypted password files
PASSWORD_FILE=passwords.enc

#
# VirtualBox Testing Options (Optional - only for VM testing)
# VM-specific settings when running bootstrap in VirtualBox
VM_MEMORY=8192
VM_DISK_SIZE=60G
VM_OPTIMIZATION=true

# ========================================
# EXAMPLE 2: PERSONAL GAMING SYSTEM
# ========================================

# Uncomment and modify these values for a personal gaming setup:
# HOSTNAME=gaming-rig
# USER_NAME=gamer
# WIFI_SSID=MyHomeWiFi
# WIFI_PASSWORD=MyWiFiPassword
# PROFILE=personal
# PASSWORD_MODE=generate
# PASSWORD_FILE=passwords.enc
# VM_MEMORY=8192
# VM_DISK_SIZE=100G
# VM_OPTIMIZATION=true

# ========================================
# EXAMPLE 3: DEVELOPMENT WORKSTATION
# ========================================

# Uncomment and modify these values for a development setup:
# HOSTNAME=dev-machine
# USER_NAME=developer
# WIFI_SSID=DevNetwork
# WIFI_PASSWORD=DevPassword123
# PROFILE=development
# PASSWORD_MODE=interactive
# PASSWORD_FILE=passwords.enc
# VM_MEMORY=12288
# VM_DISK_SIZE=80G
# VM_OPTIMIZATION=true

# ========================================
# VIRTUALBOX TESTING CONFIGURATION
# ========================================

# For VirtualBox testing, use these settings:
# HOSTNAME=vm-test
# USER_NAME=testuser
# PROFILE=personal
# PASSWORD_MODE=generate
# PASSWORD_FILE=passwords.enc
# WIFI_SSID=
# WIFI_PASSWORD=
# VM_MEMORY=8192
# VM_DISK_SIZE=60G
# VM_OPTIMIZATION=true

# ========================================
# PROFILE DESCRIPTIONS
# ========================================

# work:
#   - Business applications and security hardening
#   - Development tools and communication apps
#   - Power management optimized for laptops
#   - Enhanced security features enabled

# personal:
#   - Multimedia and gaming applications
#   - Social applications and entertainment
#   - Balanced security and usability
#   - Desktop customization features

# development:
#   - Full development toolchain
#   - Programming languages and IDEs
#   - Container and virtualization tools
#   - Git and version control optimization

# ========================================
# IMPORTANT NOTES
# ========================================

# 1. Bootstrap Configuration Scope:
#    - This file contains ONLY pre-download settings
#    - Detailed settings are in config/deploy.conf after download
#    - Don't add deployment-specific options here

# 2. Network Setup:
#    - Leave WiFi empty to use ethernet or manual setup
#    - WiFi credentials are only for initial bootstrap connectivity
#    - Full network configuration happens in the deployment phase

# 3. VirtualBox Testing:
#    - VM settings only apply when running in VirtualBox
#    - Adjust memory and disk based on your host system
#    - VM_OPTIMIZATION enables guest additions and performance tweaks

# 4. Profile Selection:
#    - Profiles determine which packages and configurations are installed
#    - Each profile has its own config/deploy.conf settings
#    - Choose based on your primary use case

# 5. Repository Settings:
#    - REPO_URL should point to your repository fork if customized
#    - BRANCH allows using development or feature branches
#    - Usually don't need to change these values

# 6. Password Management:
#    - PASSWORD_MODE controls how user passwords are obtained during deployment
#    - "generate": Automatically generate secure passwords (recommended for testing)
#    - "interactive": Prompt user for passwords during deployment (secure for production)
#    - "file": Use encrypted password file (good for automation with security)
#    - "env": Use environment variables (for CI/CD environments)