# Arch Linux Hyprland Desktop Automation Configuration
# Edit these values according to your preferences

# Repository Settings (usually don't need to change)
REPO_URL=https://github.com/LyeosMaouli/lm_archlinux_desktop.git
BRANCH=main

# ========================================
# MAIN CONFIGURATION - EDIT THESE VALUES
# ========================================

# System Identity
HOSTNAME=phoenix
USERNAME=lyeosmaouli

# Localization
TIMEZONE=Europe/Paris
LOCALE=en_US.UTF-8
KEYMAP=fr

# Deployment Profile - Choose one:
# - work: Business laptop with productivity apps
# - personal: Personal system with multimedia apps  
# - development: Development environment with coding tools
PROFILE=work

# Security Settings
ENABLE_ENCRYPTION=true

# Automation Settings
AUTO_REBOOT=true

# ========================================
# OPTIONAL CONFIGURATION
# ========================================

# Password Management
# Leave empty for interactive prompts or auto-generation
# WARNING: Only set these for testing - not recommended for production
USER_PASSWORD=
ROOT_PASSWORD=
ENCRYPTION_PASSPHRASE=

# Network Configuration (usually auto-detected)
# Only needed if you have specific WiFi requirements
WIFI_SSID=
WIFI_PASSWORD=

# Package Customization
# Add extra packages you want installed (comma-separated)
EXTRA_PACKAGES=
# Add AUR packages you want installed (comma-separated)  
AUR_PACKAGES=

# ========================================
# VIRTUALBOX TESTING OPTIONS
# ========================================
# These settings are used when running with 'testing' deployment type

# VM Memory in MB (recommended: 8192 for full testing)
VM_MEMORY=8192

# VM Disk Size (recommended: 60G minimum)
VM_DISK_SIZE=60G

# Enable VM-specific optimizations
VM_OPTIMIZATION=true

# ========================================
# ADVANCED OPTIONS
# ========================================
# Only change these if you know what you're doing

# Package mirror country (auto-detected if empty)
MIRROR_COUNTRY=

# Custom kernel to install (leave empty for default)
CUSTOM_KERNEL=

# Skip certain deployment phases (comma-separated)
# Options: base,desktop,security,packages,users
SKIP_PHASES=

# Enable debug mode (very verbose logging)
DEBUG_MODE=false