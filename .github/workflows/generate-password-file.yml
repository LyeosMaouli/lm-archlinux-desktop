# Required secrets configuration in GitHub repository:
# Settings > Secrets and variables > Actions > Repository secrets
#
# Required password secrets:
# - DEPLOY_USER_PASSWORD: User account password (minimum 8 characters)
# - DEPLOY_ROOT_PASSWORD: Root account password (minimum 8 characters)
#
# Required SMTP secrets (for email delivery):
# - DEPLOY_SMTP_SERVER: SMTP server hostname (e.g., smtp.gmail.com)
# - DEPLOY_SMTP_USERNAME: SMTP username/email (used as both auth and from address)
# - DEPLOY_SMTP_PASSWORD: SMTP authentication password or app password
# 
# Note: SMTP port defaults to 465 (SSL) - no separate secret needed
#
# Optional password secrets:
# - DEPLOY_LUKS_PASSPHRASE: Disk encryption passphrase (required if encryption enabled)
# - DEPLOY_WIFI_SSID: WiFi network SSID
# - DEPLOY_WIFI_PASSWORD: WiFi network password
#
# Email delivery security notes:
# - The encrypted password file is sent as an email attachment
# - No public artifacts or releases are created
# - Email provides secure, private delivery to the specified recipient
# - Recipients should delete the email after successful deployment
#
# Anti-spam protection measures:
# - Rate limiting: Maximum 3 workflow executions per day (bypassed for repo owner)
# - Domain blocking: Temporary/disposable email domains are blocked
# - Email validation: Strict email format validation
# - User tracking: All email deliveries are logged with user and timestamp
# - Branch restrictions: Warnings for non-main branch executions (relaxed for repo owner)
# - Dynamic ownership: Repository owner is detected via GitHub API (no hardcoding)
#
# Common SMTP configurations:
# Gmail: smtp.gmail.com:587 (requires app password)
# Outlook: smtp-mail.outlook.com:587
# Yahoo: smtp.mail.yahoo.com:587
# Custom: Contact your email provider for SMTP settings