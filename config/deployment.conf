# Arch Linux Desktop Deployment - Unified Configuration
# This is the single source of truth for all deployment settings
# All other configuration files are generated from this master configuration

#
# Core System Settings (Required)
#

# System Identity
HOSTNAME="phoenix"                    # Computer name on network
USERNAME="lyeosmaouli"               # Primary user account name

# Localization 
TIMEZONE="Europe/Paris"              # System timezone
LOCALE="en_US.UTF-8"                # System language/encoding
KEYMAP="fr"                          # Keyboard layout (console and X11)

# Profile Selection
DEPLOYMENT_PROFILE="work"            # Deployment profile: work|personal|development

#
# Security Configuration
#

# Encryption
DISK_ENCRYPTION=true                 # Enable LUKS full disk encryption
ENCRYPTION_PASSPHRASE=""             # Leave empty for interactive prompt

# User Authentication
PASSWORD_MODE="generate"             # Password handling: env|file|generate|interactive
PASSWORD_FILE="passwords.enc"        # Encrypted password file (if PASSWORD_MODE=file)
USER_PASSWORD=""                     # Leave empty unless using PASSWORD_MODE=env
ROOT_PASSWORD=""                     # Leave empty unless using PASSWORD_MODE=env

# Network Security
ENABLE_FIREWALL=true                 # Enable UFW firewall
ENABLE_FAIL2BAN=true                # Enable intrusion prevention
ENABLE_AUDIT=true                   # Enable security auditing
ENABLE_SSH=false                    # Enable SSH server (false for desktops)

#
# System Configuration
#

# Storage
FILESYSTEM="ext4"                    # Root filesystem: ext4|btrfs|xfs
BOOTLOADER="systemd-boot"           # Boot manager: systemd-boot|grub
ENABLE_SWAP=true                    # Enable swap/hibernation

# Network
NETWORK_MODE="auto"                 # Network setup: auto|manual|skip
WIFI_SSID=""                        # WiFi network (leave empty for manual)
WIFI_PASSWORD=""                    # WiFi password (leave empty for manual)

# Hardware
ENABLE_BLUETOOTH=true               # Enable Bluetooth support
ENABLE_PRINTING=true                # Enable CUPS printing
ENABLE_HARDWARE_ACCEL=true          # Enable GPU hardware acceleration

#
# Desktop Environment
#

# Core Desktop
DESKTOP_SESSION="hyprland"          # Desktop: hyprland|gnome|kde|xfce
DISPLAY_MANAGER="sddm"              # Login manager: sddm|gdm|lightdm
AUDIO_SYSTEM="pipewire"             # Audio: pipewire|pulseaudio

# Theming
DESKTOP_THEME="catppuccin-mocha"    # Color theme
AUTO_LOGIN=false                    # Enable automatic login (not recommended)

#
# Package Management
#

# AUR Support
ENABLE_AUR=true                     # Enable Arch User Repository packages
CUSTOM_PACKAGES=""                  # Additional packages (space-separated)

# Package Sources
MIRROR_COUNTRY="France"             # Package mirror country (auto-detect if empty)
PARALLEL_DOWNLOADS=5                # Concurrent package downloads

#
# Development Tools (Optional)
#

# Git Configuration
GIT_USERNAME=""                     # Git username (empty = skip git config)
GIT_EMAIL=""                        # Git email (empty = skip git config)

# SSH Keys
GENERATE_SSH_KEYS=true              # Generate SSH key pair automatically
SSH_KEY_TYPE="ed25519"              # SSH key type: ed25519|rsa

#
# Automation Settings
#

# Deployment Behavior
AUTO_REBOOT=false                   # Automatically reboot after deployment
SKIP_CONFIRMATIONS=false            # Skip interactive confirmations
CONTINUE_ON_ERROR=false             # Continue deployment on non-critical errors

# Logging
LOG_LEVEL="info"                    # Logging verbosity: debug|info|warning|error
DEBUG_MODE=false                    # Enable debug mode (keep temp files)

# Performance
PARALLEL_JOBS=0                     # Parallel operations (0 = auto-detect CPU cores)
ENABLE_CACHING=true                 # Enable intelligent caching

#
# VirtualBox Testing (When running in VM)
#

# VM Optimizations
VM_GUEST_ADDITIONS=true             # Install VirtualBox guest additions
VM_OPTIMIZATIONS=true               # Apply VM-specific optimizations
VM_MEMORY="8192"                    # VM memory allocation (MB)
VM_DISK_SIZE="60G"                  # VM disk size

#
# Advanced Options (Usually don't need to change)
#

# Timeouts
NETWORK_TIMEOUT=30                  # Network operation timeout (seconds)
DOWNLOAD_TIMEOUT=300                # Package download timeout (seconds)
DISK_TIMEOUT=600                    # Disk operation timeout (seconds)

# Error Handling
MAX_RETRIES=3                       # Maximum retry attempts for failed operations
CLEANUP_ON_EXIT=true                # Clean up temporary files on exit

# CI/CD Integration
CI_MODE=false                       # Enable CI/CD optimizations
CI_NON_INTERACTIVE=true             # Disable interactive prompts in CI mode

#
# Repository Settings (For bootstrap script)
#

# Source Repository
REPO_URL="https://github.com/LyeosMaouli/lm_archlinux_desktop.git"
BRANCH="main"                       # Git branch to use

# Validation
SKIP_REPOSITORY_VERIFICATION=false  # Skip repository integrity checks