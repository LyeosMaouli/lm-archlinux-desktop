# Arch Linux Desktop Deployment Configuration
# This file is automatically generated from config/deployment.conf
# DO NOT EDIT MANUALLY - Changes will be overwritten

# User Configuration
USER_NAME="lyeosmaouli"

# User password handling mode - How to obtain passwords for user accounts
# Options: env, file, generate, interactive, auto
# Recommended: "generate" for automated deployments, "interactive" for manual setup
PASSWORD_MODE="generate"

# Path to encrypted password file (required if PASSWORD_MODE=file)
# Use scripts/utils/passwords.sh create-file to generate encrypted password files
PASSWORD_FILE="passwords.enc"
PROFILE="work"

# System Configuration
HOSTNAME="phoenix"
ENCRYPTION_ENABLED=true
FILESYSTEM="ext4"

# Network Configuration
NETWORK_MODE="auto"
WIFI_SSID=""
WIFI_PASSWORD=""

# Deployment Options
SKIP_VALIDATION=false
ENABLE_AUR=true
CUSTOM_PACKAGES=""

# Logging and Debug
LOG_LEVEL=3
DEBUG=false

# Advanced Options
BOOTLOADER="systemd-boot"
TIMEZONE="Europe/Paris"
KEYMAP="fr"
LOCALE="en_US.UTF-8"
MIRROR_COUNTRY="France"

# Security Configuration
ENABLE_FIREWALL=true
ENABLE_FAIL2BAN=true
ENABLE_AUDIT=true
ENABLE_SSH=false
SSH_PORT=22
SSH_PERMIT_ROOT_LOGIN=false

# Desktop Environment Options
DESKTOP_SESSION="hyprland"
DISPLAY_MANAGER="sddm"
AUDIO_SYSTEM="pipewire"
ENABLE_GAMING=false
ENABLE_DEVELOPMENT=true

# Hardware Optimization
ENABLE_HARDWARE_ACCEL=true

# Backup and Recovery
ENABLE_SNAPSHOTS=false

# Post-deployment Actions
AUTO_REBOOT=false
AUTO_UPDATE=true
INSTALL_EXTRAS=false

# Error Handling
CONTINUE_ON_ERROR=false
MAX_RETRIES=3
CLEANUP_ON_EXIT=true

# Performance Tuning
PARALLEL_JOBS=0
DOWNLOAD_TIMEOUT=300
NETWORK_TIMEOUT=30
DISK_TIMEOUT=600

# CI/CD Configuration
CI_MODE=false
CI_NON_INTERACTIVE=true
