# Example Deployment Configuration
# This file is automatically generated from config/deployment.conf
# Copy this file to deployment_config.yml and customize for your setup

# System Configuration
system:
  hostname: "phoenix"
  timezone: "Europe/Paris"
  locale: "en_US.UTF-8"
  keymap: "fr"

# User Configuration
user:
  username: "lyeosmaouli"
  password: ""
  shell: "/bin/zsh"

# Network Configuration
network:
  wifi:
    enabled: true
    ssid: ""
    password: ""
    security: "wpa3"
  ethernet:
    enabled: true
    dhcp: true

# Disk Configuration
disk:
  device: "/dev/sda"
  encryption:
    enabled: true
    passphrase: ""
  partitions:
    efi_size: "1G"
    swap_size: "8G"

# Desktop Configuration
desktop:
  environment: "hyprland"
  display_manager: "sddm"
  theme: "catppuccin-mocha"
  auto_login: false

# Security Configuration
security:
  firewall:
    enabled: true
  fail2ban:
    enabled: true
  audit:
    enabled: true
  ssh:
    password_auth: false
    root_login: false

# Automation Settings
automation:
  skip_confirmations: false
  auto_reboot: false
  backup_configs: true
  log_level: "info"

# VirtualBox Testing
virtualbox:
  guest_additions: true
  vm_optimizations: true

# Development Tools
development:
  git:
    username: ""
    email: ""
  ssh_keys:
    generate: true
    type: "ed25519"
